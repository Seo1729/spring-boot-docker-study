# 1. DB 접속 주소 설정 (아까 해결법 1번대로 3307 포트를 열었다면 3307로 적어줍니다!)
spring.datasource.url=jdbc:mysql://localhost:3307/mydb?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=password1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA 가 테이블을 자동으로 만들어주는 옵션 (개발할 때 엄청 편합니다)
spring.jpa.hibernate.ddl-auto=update

# 3. 콘솔창에 진짜 SQL 문을 예쁘게 출력해주는 옵션
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true